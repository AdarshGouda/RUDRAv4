ps2_uno_to_teensy:
  ros__parameters:
    # Replace with actual persistent ports from: ls -l /dev/serial/by-id/
    uno_port: "/dev/serial/by-id/usb-Arduino__www.arduino.cc__0043_959313232323510182C0-if00"
    teensy_port: "/dev/serial/by-id/usb-Teensyduino_USB_Serial_9210670-if00"

    baud: 115200
    timer_period_sec: 0.02
    command_timeout_sec: 0.30

    # RUDRAv3 PS2 behavior
    select_as_enable: true
    axis_center: 127
    axis_range: 127
    deadband: 15
    max_sabertooth_cmd: 127

    # Published /cmd_vel preview for ROS2 integration
    publish_cmd_vel: true
    max_linear_speed_mps: 1.20
    max_angular_speed_radps: 2.50
    send_stop_when_disabled: true

    # Runtime obstacle guard control from PS2.
    # Updated Uno firmware publishes a latched guard field toggled by START.
    # The PS2 MODE button is not exposed as a normal readable button by the
    # vendored PS2X library.
    ps2_obstacle_latch_enabled: true
    ps2_obstacle_control_enabled: false
    ps2_obstacle_control_hold_sec: 0.80
    ps2_obstacle_control_threshold: 90
    ps2_obstacle_control_require_stopped: true

    # LiDAR obstacle guard, based on RUDRAv3 navigation's LaserScan topic.
    # Forward drive slows below obstacle_slow_distance_m and stops below
    # obstacle_stop_distance_m. Reverse and turn-in-place remain available.
    obstacle_avoidance_enabled: true
    obstacle_enable_topic: "/rudra/obstacle_guard_enable"
    scan_topic: "/scan"
    obstacle_front_angle_deg: 70.0
    obstacle_stop_distance_m: 0.45
    obstacle_slow_distance_m: 1.00
    obstacle_scan_timeout_sec: 0.75
    obstacle_status_period_sec: 0.25
    obstacle_marker_topic: "/rudra/obstacle_guard_marker"
    obstacle_marker_frame: "laser"

cmd_vel_to_teensy:
  ros__parameters:
    teensy_port: "/dev/serial/by-id/usb-Teensyduino_USB_Serial_9210670-if00"
    baud: 115200
    wheelbase_m: 0.29
    max_linear_speed_mps: 1.20
    max_sabertooth_cmd: 127
    cmd_timeout_sec: 0.30
    timer_period_sec: 0.02
    enable_on_nonzero_cmd: true

    # LiDAR obstacle guard, based on RUDRAv3 navigation's LaserScan topic.
    # Forward drive slows below obstacle_slow_distance_m and stops below
    # obstacle_stop_distance_m. Reverse and turn-in-place remain available.
    obstacle_avoidance_enabled: true
    obstacle_enable_topic: "/rudra/obstacle_guard_enable"
    scan_topic: "/scan"
    obstacle_front_angle_deg: 70.0
    obstacle_stop_distance_m: 0.45
    obstacle_slow_distance_m: 1.00
    obstacle_scan_timeout_sec: 0.75
    obstacle_status_period_sec: 0.25
    obstacle_marker_topic: "/rudra/obstacle_guard_marker"
    obstacle_marker_frame: "laser"
